# OpenMasjidOS — core service definition
# This file is written by install.sh and managed by the installer.
# Edit with care; re-running install.sh will refresh it.

services:
  core:
    image: ghcr.io/hasan-ismail/openmasjid-core:latest
    container_name: openmasjid-core
    restart: unless-stopped
    ports:
      # 80 = HTTP front door (health, Fabric, redirect to HTTPS); 443 = dashboard.
      - "80:80"
      - "443:443"
      # Per-app HTTPS proxies for Stripe apps that need a secure context.
      - "8443-8452:8443-8452"
    # Lets the per-app TLS proxy reach an app's published port on the host.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      # The Docker socket — the core manages app containers through it.
      - /var/run/docker.sock:/var/run/docker.sock
      # Persistent data: config, app state, per-app volumes.
      - /opt/openmasjid:/data
      # Host /proc (read-only) so memory/CPU stats reflect the machine/LXC.
      - /proc:/host/proc:ro
      # Host cgroup (read-only) so memory matches the machine/LXC the way
      # Proxmox reports it (memory.current − reclaimable cache).
      - /sys/fs/cgroup:/host/sys/fs/cgroup:ro
    environment:
      - OPENMASJID_DATA_DIR=/data
      - OPENMASJID_PORT=80
      - HOST_PROC=/host/proc
      - HOST_CGROUP=/host/sys/fs/cgroup
      - NODE_ENV=production
    healthcheck:
      # Alpine ships busybox wget — a tiny HTTP check against the daemon.
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:80/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    labels:
      - "com.openmasjid.service=core"
