# OpenMasjidOS — core service definition
# This file is written by install.sh and managed by the installer.
# Edit with care; re-running install.sh will refresh it.

services:
  core:
    image: ghcr.io/hasan-ismail/openmasjid-core:latest
    container_name: openmasjid-core
    restart: unless-stopped
    ports:
      - "8723:8723"
    volumes:
      # The Docker socket — the core manages app containers through it.
      - /var/run/docker.sock:/var/run/docker.sock
      # Persistent data: config, app state, per-app volumes.
      - /opt/openmasjid:/data
    environment:
      - OPENMASJID_DATA_DIR=/data
      - OPENMASJID_PORT=8723
      - NODE_ENV=production
    healthcheck:
      # Alpine ships busybox wget — a tiny HTTP check against the daemon.
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8723/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    labels:
      - "com.openmasjid.service=core"
