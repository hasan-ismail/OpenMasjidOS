# OpenMasjidOS — core service definition
# This file is written by install.sh and managed by the installer.
# Edit with care; re-running install.sh will refresh it.

services:
  core:
    image: ghcr.io/hasan-ismail/openmasjid-core:latest
    container_name: openmasjid-core
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /opt/openmasjid:/data
      # Host /proc and /sys (read-only) so system stats reflect the machine.
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
    environment:
      - OPENMASJID_DATA_DIR=/data
      - OPENMASJID_PORT=80
      - OPENMASJID_LOG_LEVEL=info
      - HOST_PROC=/host/proc
      - HOST_SYS=/host/sys
    healthcheck:
      # Distroless image has no shell/wget/curl; the binary self-checks.
      test: ["CMD", "/openmasjid", "-healthcheck"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    labels:
      - "com.openmasjid.core=true"
